common:
  - type: AgenticAccess
    url: agentic-access/allianz-engagement-survey-agentic-access.yml
  - type: DomainSecurity
    url: security/allianz-engagement-survey-domain-security.yml
  - type: Authentication
    url: authentication/allianz-engagement-survey-authentication.yml
  - type: OAuthScopes
    url: scopes/allianz-engagement-survey-scopes.yml
  - url: https://www.allianz.com/
    type: Website
  - url: https://github.com/allianz
    type: GitHubOrganization
  - url: rules/allianz-engagement-survey-spectral-rules.yml
    type: SpectralRules
  - url: vocabulary/allianz-engagement-survey-vocabulary.yaml
    type: Vocabulary
  - url: capabilities/employee-engagement-workflow.yaml
    type: NaftikoCapability
  - type: Features
    data:
      - name: Survey Lifecycle Management
        description: >-
          Create, configure, publish, and close employee engagement surveys
          with full lifecycle tracking and audit capabilities.
      - name: Participant Management
        description: >-
          Manage survey participants, send invitations, track response rates,
          and send reminders to boost participation across business units.
      - name: Response Collection
        description: >-
          Collect structured survey responses with support for multiple
          question types including Likert scales, open text, and multiple choice.
      - name: Analytics and Reporting
        description: >-
          Generate engagement analytics, participation metrics, and comparative
          reports across departments, regions, and time periods.
      - name: Segmentation
        description: >-
          Segment survey results by business unit, geography, role, tenure,
          and demographic dimensions for targeted insights.
      - name: Action Planning
        description: >-
          Track and manage action plans created in response to survey insights
          to drive employee experience improvements.
  - type: UseCases
    data:
      - name: Annual Engagement Survey
        description: >-
          Run company-wide annual employee engagement surveys to measure
          satisfaction, commitment, and advocacy across all Allianz entities.
      - name: Pulse Surveys
        description: >-
          Deploy frequent short pulse surveys to track engagement trends and
          respond quickly to changing employee sentiment.
      - name: Onboarding Surveys
        description: >-
          Capture new employee experience feedback during onboarding to
          improve the joining experience and early retention.
      - name: Exit Surveys
        description: >-
          Collect departing employee feedback to understand attrition drivers
          and improve retention strategies.
  - type: Integrations
    data:
      - name: Workday
        description: >-
          Integration with Workday HCM for automated participant roster
          management and organizational hierarchy synchronization.
      - name: Microsoft Teams
        description: >-
          Survey notifications and reminders delivered through Microsoft Teams
          to increase employee participation rates.
      - name: Power BI
        description: >-
          Export engagement analytics to Power BI for advanced visualization
          and executive dashboard reporting.
  - url: https://www.allianz.com/en/press.html
    type: Blog
  - url: packages/allianz-engagement-survey-packages.yml
    type: Packages
  - url: well-known/allianz-engagement-survey-well-known.yml
    type: WellKnown
  - url: llms/allianz-engagement-survey-llms.txt
    type: LLMsTxt
